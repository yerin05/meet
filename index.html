<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 무한 캘린더!</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #F4F7F6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 { text-align: center; color: #333; margin-bottom: 5px; font-weight: 800; font-size: 28px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 15px; word-break: keep-all; line-height: 1.4; }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #eee;
            gap: 15px;
        }

        .user-input { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; }
        
        input[type="text"] {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            width: 130px;
            flex: 1;
            min-width: 100px;
            box-sizing: border-box;
        }
        input[type="text"]:focus { border-color: #E53935; }

        .btn-input, .btn-confirm {
            padding: 12px 15px;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-input { background-color: #E53935; }
        .btn-input:hover { background-color: #C62828; }

        .btn-confirm { background-color: #4CAF50; margin-left: auto; }
        .btn-confirm:hover { background-color: #388E3C; }
        .btn-confirm.active { background-color: #1B5E20; box-shadow: 0 0 0 3px #A5D6A7; }

        .status {
            font-size: 14px;
            color: #444;
            background: #f5f5f5;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            white-space: nowrap;
        }

        .calendar-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .calendar-header h2 {
            margin: 0;
            font-size: 24px;
            color: #E53935;
            width: 140px;
            text-align: center;
        }
        .nav-btn {
            background: none;
            color: #888;
            border: none;
            font-size: 20px;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        .nav-btn:hover { background: #eee; color: #333; }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            touch-action: none; 
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            color: #555;
            font-size: 14px;
        }
        .sun { color: #E53935; } 
        .sat { color: #1E88E5; } 

        .date-cell {
            background-color: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            height: 95px;
            display: flex;
            flex-direction: column;
            padding: 8px;
            cursor: pointer;
            transition: all 0.1s;
            box-sizing: border-box;
            position: relative;
        }
        
        .date-cell:not(.empty):hover { border-color: #ffcdd2; }
        .empty { background-color: transparent; border: none; cursor: default; }

        .date-num { 
            font-weight: bold; 
            font-size: 16px; 
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }

        .is-confirmed {
            background-color: #E8F5E9 !important;
            border-color: #4CAF50 !important;
        }
        .is-confirmed .date-num {
            background-color: #4CAF50;
            color: white;
        }
        .location-text {
            color: #2E7D32;
            font-size: 12px;
            font-weight: bold;
            margin-top: 4px;
            word-break: keep-all;
        }

        .busy-list { 
            font-size: 11px; 
            line-height: 1.3; 
            font-weight: bold; 
            text-align: right; 
            word-break: keep-all; 
            margin-top: auto;
        }

        .level-0 { background-color: #ffffff; } 
        .level-1 { background-color: #ffcdd2; border-color: #ffcdd2; color: #d32f2f; } 
        .level-2 { background-color: #ef5350; border-color: #ef5350; color: white; } 
        .level-3 { background-color: #c62828; border-color: #c62828; color: white; } 
        .level-4 { background-color: #212121; border-color: #212121; color: white; } 

        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
        }
        .legend-box {
            width: 16px;
            height: 16px;
            display: inline-block;
            border-radius: 4px;
            vertical-align: text-bottom;
            margin-right: 6px;
            border: 1px solid #ddd;
        }

        @media (max-width: 600px) {
            body { padding: 10px 5px; }
            .container { padding: 20px 15px; border-radius: 16px; }
            h1 { font-size: 22px; }
            .subtitle { font-size: 13px; }
            
            .control-panel { flex-direction: column; align-items: stretch; gap: 15px; }
            .user-input { justify-content: center; }
            .btn-confirm { margin-left: 0; }
            .status { text-align: center; }

            .calendar-header h2 { font-size: 20px; width: 120px; }
            .calendar { gap: 4px; }
            
            .date-cell { height: 75px; padding: 4px; border-radius: 8px; }
            .day-header { font-size: 12px; }
            .date-num { width: 22px; height: 22px; font-size: 13px; }
            
            .busy-list { font-size: 9px; line-height: 1.1; }
            .location-text { font-size: 9px; margin-top: 2px; }
            
            .legend { gap: 10px; padding: 10px; font-size: 11px; }
            .legend-box { width: 12px; height: 12px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>우리 언제 봐? 📅</h1>
        <p class="subtitle">이름을 적고 <b>'약속 불가능한 날짜'</b>를 지워주세요!<br>합의가 끝나면 <b>[약속 확정]</b> 버튼을 눌러 날짜와 장소를 정할 수 있습니다.</p>

        <div class="control-panel">
            <div class="user-input">
                <input type="text" id="userName" placeholder="이름 (예: 철수)">
                <button class="btn-input" onclick="startSelecting()">일정 입력</button>
                <button class="btn-confirm" id="confirmBtn" onclick="toggleConfirmMode()">약속 확정 🎯</button>
            </div>
            <div class="status" id="statusText">참여자: 0명</div>
        </div>

        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <h2 id="monthTitle">2026년 6월</h2>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>

        <div class="calendar" id="calendar"></div>

        <div class="legend">
            <span><div class="legend-box level-0"></div>가능!</span>
            <span><div class="legend-box level-1"></div>1명 안됨</span>
            <span><div class="legend-box level-2"></div>2명 안됨</span>
            <span><div class="legend-box level-4" style="background:#212121"></div>전원 불가 ☠️</span>
            <span><div class="legend-box" style="background:#4CAF50; border-radius:50%"></div><b>약속 확정!</b></span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ==========================================
        // 🚨 아래 괄호 안에 복사한 코드를 덮어쓰기 하세요!
        // ==========================================
        const firebaseConfig = {
           apiKey: "AIzaSyBAdVAn2J7IGAKzb3jZvtMifwoSMpCw9UQ",
  authDomain: "meet-f29bb.firebaseapp.com",
  projectId: "meet-f29bb",
  storageBucket: "meet-f29bb.firebasestorage.app",
  messagingSenderId: "1060617529659",
  appId: "1:1060617529659:web:43ead2fd9aa20889fa2f1e",
  measurementId: "G-J5Z6H9NZ7C"
        };
        // ==========================================
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = 'meeting_room_1'; // 방 이름 (고정)

        let today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth() + 1;
        
        let currentUser = "";
        let isDragging = false;
        let isSelecting = true; 
        
        let isConfirmMode = false;
        let confirmedMeeting = null;

        let scheduleData = {}; 
        let users = new Set(); 

        const calendar = document.getElementById('calendar');
        const monthTitle = document.getElementById('monthTitle');
        const statusText = document.getElementById('statusText');
        const confirmBtn = document.getElementById('confirmBtn');

        // 🔥 서버에서 실시간으로 데이터 받아오기
        db.ref(ROOM_ID + '/scheduleData').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            // 로컬 데이터 초기화 후 서버 데이터로 덮어쓰기
            Object.keys(scheduleData).forEach(key => scheduleData[key] = []); 
            Object.assign(scheduleData, data);
            updateCalendarColors();
            
            // 참여자 수 계산
            users.clear();
            Object.values(data).forEach(arr => {
                arr.forEach(name => users.add(name));
            });
            if(currentUser) users.add(currentUser);
            statusText.innerText = `참여자: ${Array.from(users).join(', ')} (${users.size}명)`;
        });

        // 🔥 서버에서 실시간으로 확정된 약속 받아오기
        db.ref(ROOM_ID + '/confirmedMeeting').on('value', (snapshot) => {
            confirmedMeeting = snapshot.val();
            updateCalendarColors();
        });

        function renderCalendar(year, month) {
            calendar.innerHTML = ''; 
            monthTitle.innerText = `${year}년 ${month}월`;

            const days = [
                { name: '일', class: 'sun' }, { name: '월', class: '' }, 
                { name: '화', class: '' }, { name: '수', class: '' }, 
                { name: '목', class: '' }, { name: '금', class: '' }, 
                { name: '토', class: 'sat' }
            ];
            days.forEach(day => {
                const header = document.createElement('div');
                header.className = `day-header ${day.class}`;
                header.innerText = day.name;
                calendar.appendChild(header);
            });

            const firstDay = new Date(year, month - 1, 1).getDay(); 
            const lastDate = new Date(year, month, 0).getDate(); 

            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'date-cell empty';
                calendar.appendChild(emptyCell);
            }

            for (let date = 1; date <= lastDate; date++) {
                const fullDateKey = `${year}-${month}-${date}`;
                if (!scheduleData[fullDateKey]) { scheduleData[fullDateKey] = []; }

                const cell = document.createElement('div');
                cell.className = 'date-cell level-0';
                cell.dataset.date = fullDateKey;
                
                const dateNum = document.createElement('div');
                dateNum.className = 'date-num';
                dateNum.innerText = date;
                const currentDay = new Date(year, month - 1, date).getDay();
                if (currentDay === 0) dateNum.classList.add('sun');
                if (currentDay === 6) dateNum.classList.add('sat');
                
                const locationText = document.createElement('div');
                locationText.className = 'location-text';

                const busyList = document.createElement('div');
                busyList.className = 'busy-list';
                
                cell.appendChild(dateNum);
                cell.appendChild(locationText);
                cell.appendChild(busyList);
                
                cell.addEventListener('mousedown', (e) => processCellAction(e.target.closest('.date-cell'), false));
                cell.addEventListener('mouseenter', (e) => processCellAction(e.target.closest('.date-cell'), true));
                
                calendar.appendChild(cell);
            }
            updateCalendarColors();
        }

        function changeMonth(step) {
            currentMonth += step;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; } 
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            renderCalendar(currentYear, currentMonth);
        }

        function startSelecting() {
            if (isConfirmMode) toggleConfirmMode(); 
            
            const name = document.getElementById('userName').value.trim();
            if (!name) { alert("이름을 먼저 입력해주세요!"); return; }
            if (users.size >= 4 && !users.has(name)) { alert("이미 4명이 꽉 찼습니다!"); return; }

            currentUser = name;
            users.add(name);
            statusText.innerText = `참여자: ${Array.from(users).join(', ')} (${users.size}명)`;
            alert(`[${name}]님, 달력에서 '안 되는 날짜'를 찍어주세요!`);
        }

        function toggleConfirmMode() {
            isConfirmMode = !isConfirmMode;
            if (isConfirmMode) {
                confirmBtn.classList.add('active');
                confirmBtn.innerText = "확정 날짜 찍기...";
            } else {
                confirmBtn.classList.remove('active');
                confirmBtn.innerText = "약속 확정 🎯";
            }
        }

        // DB에 저장하는 함수들
        function saveScheduleToDB(dateKey) {
            db.ref(ROOM_ID + '/scheduleData/' + dateKey).set(scheduleData[dateKey]);
        }
        function saveConfirmToDB(meetingData) {
            db.ref(ROOM_ID + '/confirmedMeeting').set(meetingData);
        }

        function processCellAction(cell, isHoverEvent) {
            if (!cell || cell.classList.contains('empty')) return;
            const dateKey = cell.dataset.date;

            // [확정 모드] 처리
            if (isConfirmMode) {
                if (isHoverEvent) return; 
                
                if (confirmedMeeting && confirmedMeeting.dateKey === dateKey) {
                    if (confirm("이 날짜의 약속 확정을 취소하시겠습니까?")) {
                        saveConfirmToDB(null); // 서버에서 확정 삭제
                    }
                    toggleConfirmMode();
                    return;
                }
                
                const [y, m, d] = dateKey.split('-');
                const locationInput = prompt(`${y}년 ${m}월 ${d}일로 약속을 확정합니다!\n만날 장소나 메모를 입력해주세요:`, "강남역 2번 출구");
                
                if (locationInput !== null) {
                    saveConfirmToDB({ dateKey: dateKey, location: locationInput }); // 서버에 확정 저장
                    toggleConfirmMode(); 
                }
                return;
            }

            // [일반 입력 모드] 처리
            if (!currentUser) { 
                if (!isHoverEvent) alert("이름을 먼저 입력하고 [일정 입력]을 눌러주세요!"); 
                return; 
            }
            
            const myIndex = scheduleData[dateKey].indexOf(currentUser);

            if (!isHoverEvent) {
                isDragging = true;
                if (myIndex > -1) {
                    isSelecting = false; 
                    scheduleData[dateKey].splice(myIndex, 1);
                } else {
                    isSelecting = true; 
                    scheduleData[dateKey].push(currentUser);
                }
                saveScheduleToDB(dateKey); // 칠하자마자 서버에 저장!
            } else {
                if (isDragging) {
                    let changed = false;
                    if (isSelecting && myIndex === -1) {
                        scheduleData[dateKey].push(currentUser);
                        changed = true;
                    } else if (!isSelecting && myIndex > -1) {
                        scheduleData[dateKey].splice(myIndex, 1);
                        changed = true;
                    }
                    if(changed) saveScheduleToDB(dateKey); // 드래그 할 때마다 서버에 저장!
                }
            }
        }
        
        document.addEventListener('mouseup', () => { isDragging = false; });
        document.addEventListener('touchend', () => { isDragging = false; lastTouchCell = null; });

        let lastTouchCell = null;

        calendar.addEventListener('touchstart', (e) => {
            const cell = e.target.closest('.date-cell');
            if (cell && !isConfirmMode && currentUser) {
                e.preventDefault(); 
            }
            processCellAction(cell, false);
        }, { passive: false });

        calendar.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); 
            
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const cell = target ? target.closest('.date-cell') : null;
            
            if (cell && cell !== lastTouchCell) {
                lastTouchCell = cell;
                processCellAction(cell, true); 
            }
        }, { passive: false });


        function updateCalendarColors() {
            const cells = document.querySelectorAll('.date-cell:not(.empty)');
            cells.forEach(cell => {
                const dateKey = cell.dataset.date;
                const busyUsers = scheduleData[dateKey] || [];
                const count = busyUsers.length;
                
                const locationTextDiv = cell.querySelector('.location-text');
                const busyListDiv = cell.querySelector('.busy-list');
                
                cell.className = `date-cell level-${count}`;
                locationTextDiv.innerText = "";
                
                if (count > 0) {
                    busyListDiv.innerText = (count >= 4) ? "전원 불가" : busyUsers.join(', ') + " ❌";
                } else {
                    busyListDiv.innerText = "";
                }

                if (confirmedMeeting && confirmedMeeting.dateKey === dateKey) {
                    cell.className = `date-cell is-confirmed`; 
                    locationTextDiv.innerText = "📍 " + confirmedMeeting.location;
                    busyListDiv.innerText = "🎉";
                }
            });
        }

        renderCalendar(currentYear, currentMonth);
    </script>
</body>
</html>
